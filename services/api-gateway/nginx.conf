server {
    listen 80;
    server_name localhost;

    # Required when proxy_pass uses variables (PUZZLE_UPSTREAM / VOICE_UPSTREAM).
    # Without this, nginx returns 502 with "no resolver defined" for domain upstreams.
    resolver 1.1.1.1 8.8.8.8 valid=30s ipv6=off;
    resolver_timeout 5s;

    # ──────────────────────────────────────────────
    # Global settings
    # ──────────────────────────────────────────────
    client_max_body_size 10M;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ──────────────────────────────────────────────
    # CORS — handled globally at the gateway
    # ──────────────────────────────────────────────
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Premium-User, X-Request-ID" always;
    add_header Access-Control-Max-Age "86400" always;

    # Preflight requests
    if ($request_method = 'OPTIONS') {
        return 204;
    }

    # ──────────────────────────────────────────────
    # Health — gateway itself
    # ──────────────────────────────────────────────
    location = /health {
        return 200 '{"status":"ok","service":"api-gateway"}';
        add_header Content-Type application/json;
    }

    # ──────────────────────────────────────────────
    # Puzzle Generator Service (Go)
    #   /api/v1/puzzle/*, /api/v1/session/*, /api/v1/health
    # ──────────────────────────────────────────────
    location /api/v1/ {
        proxy_pass ${PUZZLE_UPSTREAM}/api/v1/;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # Swagger docs for puzzle service
    location /swagger/ {
        proxy_pass ${PUZZLE_UPSTREAM}/swagger/;
    }

    # Puzzle service root health
    location = /api/v1/health {
        proxy_pass ${PUZZLE_UPSTREAM}/api/v1/health;
    }

    # ──────────────────────────────────────────────
    # Voice-to-Move Service (Python / FastAPI)
    #   /voice/v1/* → voice-to-move:8001/api/v1/*
    # ──────────────────────────────────────────────
    location /voice/v1/ {
        proxy_pass ${VOICE_UPSTREAM}/api/v1/;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
        # Required for file uploads (audio)
        client_max_body_size 10M;
    }

    # Voice service WebSocket
    location /voice/v1/voice/ws {
        proxy_pass ${VOICE_UPSTREAM}/api/v1/voice/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }

    # Voice service docs
    location /voice/docs {
        proxy_pass ${VOICE_UPSTREAM}/docs;
    }

    location /voice/redoc {
        proxy_pass ${VOICE_UPSTREAM}/redoc;
    }

    location /voice/openapi.json {
        proxy_pass ${VOICE_UPSTREAM}/openapi.json;
    }

    # Voice service health
    location = /voice/health {
        proxy_pass ${VOICE_UPSTREAM}/health;
    }

    # ──────────────────────────────────────────────
    # Future services — placeholders
    # Uncomment and configure as services are added
    # ──────────────────────────────────────────────

    # Game Service
    # location /game/v1/ {
    #     proxy_pass http://game-service:8002/api/v1/;
    # }

    # Chat Service
    # location /chat/v1/ {
    #     proxy_pass http://chat-service:8003/api/v1/;
    # }

    # History Service
    # location /history/v1/ {
    #     proxy_pass http://history-service:8004/api/v1/;
    # }

    # ──────────────────────────────────────────────
    # Root info
    location = / {
        return 200 '{"status":"ok","service":"api-gateway","hint":"Use /api/v1 for puzzles and /voice/v1 for voice"}';
        add_header Content-Type application/json;
    }

    # Fallback
    # ──────────────────────────────────────────────
    location / {
        return 404 '{"error":"not found","hint":"Use /api/v1/ for puzzles, /voice/v1/ for voice"}';
        add_header Content-Type application/json;
    }
}

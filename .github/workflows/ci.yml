name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  puzzle-generator:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/puzzle-generator
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: services/puzzle-generator/go.mod
      - run: go test ./...
      - run: go vet ./...
      - run: go build ./...

  voice-to-move:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/voice-to-move
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt pytest
      - run: pytest

  api-gateway:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build API gateway image
        run: docker build -t api-gateway-ci ./services/api-gateway

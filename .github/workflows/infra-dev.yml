name: Terraform Dev API Gateway

on:
  workflow_dispatch:
    inputs:
      action:
        description: Terraform action to execute
        required: true
        type: choice
        options:
          - plan
          - apply
        default: plan
      aws_region:
        description: AWS region
        required: true
        default: eu-west-3
      api_backend_url:
        description: Public ingress URL of existing EKS app gateway (for API Gateway integration)
        required: false
        default: http://example.com

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest
    environment: dev
    defaults:
      run:
        working-directory: infra/terraform/environments/dev
    env:
      TF_IN_AUTOMATION: true
      TF_VAR_aws_region: ${{ github.event.inputs.aws_region }}
      TF_VAR_api_backend_url: ${{ github.event.inputs.api_backend_url }}
      EKS_CLUSTER_IAM_ROLE_ARN: ${{ secrets.EKS_CLUSTER_IAM_ROLE_ARN }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.EKS_CLUSTER_IAM_ROLE_ARN }}
          aws-region: ${{ github.event.inputs.aws_region }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        if: github.event.inputs.action == 'plan'
        run: terraform plan

      - name: Terraform apply
        if: github.event.inputs.action == 'apply'
        run: terraform apply -auto-approve

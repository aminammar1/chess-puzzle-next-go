name: Build and Push Images (GHCR)

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Optional image tag override
        required: false
        default: ""

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: client
            context: ./client
            dockerfile: ./client/Dockerfile
          - name: api-gateway
            context: ./services/api-gateway
            dockerfile: ./services/api-gateway/Dockerfile
          - name: puzzle-generator
            context: ./services/puzzle-generator
            dockerfile: ./services/puzzle-generator/Dockerfile
          - name: voice-to-move
            context: ./services/voice-to-move
            dockerfile: ./services/voice-to-move/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: vars
        run: |
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            echo "tag=${{ github.event.inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/chess-puzzle-next-go/${{ matrix.service.name }}:${{ steps.vars.outputs.tag }}
